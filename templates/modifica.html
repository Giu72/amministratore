<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Modifica Scadenza</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <h2>✏️ Modifica Scadenza</h2>
    <form method="post">
        <div class="mb-3">
            <label>Email</label>
            <input type="email" name="email" class="form-control" value="{{ scadenza.condomino_email }}" required>
        </div>
        <div class="mb-3">
            <label>Nome</label>
            <input type="text" name="nome" class="form-control" value="{{ scadenza.condomino_nome }}" required>
        </div>
        <div class="mb-3">
            <label>Descrizione</label>
            <input type="text" name="descrizione" class="form-control" value="{{ scadenza.descrizione }}" required>
        </div>
        <div class="mb-3">
            <label>Importo</label>
            <input type="number" step="0.01" name="importo" class="form-control" value="{{ scadenza.importo }}" required>
        </div>
        <div class="mb-3">
            <label>Data scadenza</label>
            <input type="date" name="data_scadenza" class="form-control" value="{{ scadenza.data_scadenza }}" required>
        </div>
        <div class="mb-3">
            <label>Stato</label>
            <select name="stato" class="form-select">
                <option value="non pagato" {% if scadenza.stato == 'non pagato' %}selected{% endif %}>Non pagato</option>
                <option value="pagato" {% if scadenza.stato == 'pagato' %}selected{% endif %}>Pagato</option>
            </select>
        </div>
        <button type="submit" class="btn btn-primary">Salva modifiche</button>
        <a href="{{ url_for('index') }}" class="btn btn-secondary">Annulla</a>
    </form>
</div>
</body>
</html>
